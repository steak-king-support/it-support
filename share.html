<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <title>Share Steak King IT Support</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    div {
      border: none;
      width:100%; 
      height:100%;
      margin:auto;
      padding: auto;
    }
    img { 
      border: none;
      width:auto; 
      height:100vh;
      display: block;
      margin: 0 auto; /* centers horizontally */
    }
    .back-button {
      position: fixed;
      top: 40px;
      left: 40px;
      background-color: #66a9d6;
      color: black;
      padding: 24px 40px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .back-button:hover {
      background-color: #00ffea;
    }
  </style>
  
</head>
<body>
  <div>
    <img src="images/share_QR.png">
  </div>

  <!-- Back button -->
  <a href="https://steak-king-support.github.io/it-support/" class="back-button">Submit a ticket</a>
</body>
</html>
