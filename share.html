<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share Steak King IT Support</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #b22222;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #333;
      margin-bottom: 20px;
    }

    img {
      max-width: 50vh;
      height: auto;
      margin: 20px 0;
    }

    .support-link {
      display: inline-block;
      background-color: #66a9d6;
      color: black;
      padding: 14px 28px;
      border-radius: 6px;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: background-color 0.3s ease;
    }

    .support-link:hover {
      background-color: #00ffea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>STEAK KING IT SUPPORT</h1>
    <p>Submit any technical support queries, complaints, or issues to us.</p>
    <img src="images/customer_service_qr.png" alt="Customer Service QR Code">
    <a href="https://steak-king-support.github.io/it-support/" class="support-link">Submit a Ticket</a>
  </div>
</body>
</html>
