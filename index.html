<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steak King IT Support</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #b22222;
      margin-bottom: 20px;
    }
    p {
      margin-bottom: 30px;
      font-size: 18px;
      color: #333;
    }
    .login-button {
      background-color: #b22222; /* Steak King red */
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .login-button:hover {
      background-color: #8b1a1a;
    }
    .share-button {
      display: inline-block;
      margin-top: 20px;
      background-color: #444;
      color: white;
      padding: 14px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .share-button:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <div class="container">

    <div>
      <img src="images/favicon.ico">
    </div>

    <h1>Steak King IT Support</h1>
    <p>You must log in with your Steak King account to access the support form.</p>
    
    <!-- Login button -->
    <a href="https://forms.office.com/r/21866wJ0fi" class="login-button">Login with Steak King Account</a>
    
    <!-- Share button -->
    <a href="https://steak-king-support.github.io/it-support/share" class="share-button">Share Page</a>
  </div>
</body>
</html>
